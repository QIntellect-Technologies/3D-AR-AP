pluginManagement {
  repositories {
    gradlePluginPortal()
    google()
    mavenCentral()
  }

  includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins { id("com.facebook.react.settings") }
dependencyResolutionManagement {
  repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS) // or FAIL_ON_PROJECT_REPOS causes issues sometimes
  repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
  }
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'Android3DARApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
include(":opencv")
project(":opencv").projectDir = file("opencv")