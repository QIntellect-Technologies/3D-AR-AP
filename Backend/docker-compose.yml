version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: src/workers/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=...
      - SUPABASE_SERVICE_ROLE_KEY=...
      - TEMP_PROJECTS_DIR=/app/temp-projects # NEW
    volumes:
      - .:/app
      - /app/node_modules
      - temp-projects:/app/temp-projects # NEW shared folder
    command: npx ts-node src/workers/reconstruction.ts

volumes:
  redis-data:
  temp-projects:
